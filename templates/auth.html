{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full glass-card p-8 rounded-3xl relative overflow-hidden shadow-2xl">
        <!-- Decorative blob -->
        <div
            class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-50 animate-blob">
        </div>
        <div
            class="absolute bottom-0 left-0 -mb-4 -ml-4 w-24 h-24 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-50 animate-blob animation-delay-2000">
        </div>

        <div class="relative z-10">
            <div id="login-form">
                <div>
                    <h2 class="text-center text-3xl font-extrabold text-white mb-2">Welcome Back</h2>
                    <p class="text-center text-sm opacity-70 mb-8">Sign in to access your dashboard</p>
                    {% if error %}
                    <p class="text-center text-sm text-red-400 mb-4">{{ error }}</p>
                    {% endif %}
                </div>
                <form class="mt-8 space-y-6" action="/login" method="POST">
                    <div class="rounded-md shadow-sm space-y-4">
                        <div>
                            <label for="email-address" class="sr-only">Email address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-envelope text-gray-400"></i>
                                </div>
                                <input id="email-address" name="email" type="email" required
                                    class="appearance-none rounded-xl relative block w-full px-3 py-3 pl-10 glass-input placeholder-gray-400 sm:text-sm transition-all text-white"
                                    placeholder="Email address">
                            </div>
                        </div>
                        <div>
                            <label for="password" class="sr-only">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input id="password" name="password" type="password" required
                                    class="appearance-none rounded-xl relative block w-full px-3 py-3 pl-10 glass-input placeholder-gray-400 sm:text-sm transition-all text-white"
                                    placeholder="Password">
                            </div>
                        </div>
                    </div>
                    <div>
                        <button type="submit"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 focus:outline-none shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all">
                            Sign In
                        </button>
                    </div>
                </form>
                <div class="mt-6 text-center text-sm">
                    <span class="opacity-70">Don't have an account?</span>
                    <button onclick="toggleAuth('signup')"
                        class="font-medium text-pink-400 hover:text-pink-300 transition ml-1">Sign up</button>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <div>
                    <h2 class="text-center text-3xl font-extrabold text-white mb-2">Create Account</h2>
                    <p class="text-center text-sm opacity-70 mb-8">Join the AI Resume platform</p>
                </div>
                <form class="mt-8 space-y-6" action="/signup" method="POST">
                    <div class="rounded-md shadow-sm space-y-4">
                        <div>
                            <label for="signup-name" class="sr-only">Full Name</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-user text-gray-400"></i>
                                </div>
                                <input id="signup-name" name="name" type="text" required
                                    class="appearance-none rounded-xl relative block w-full px-3 py-3 pl-10 glass-input placeholder-gray-400 sm:text-sm transition-all text-white"
                                    placeholder="Full Name">
                            </div>
                        </div>
                        <div>
                            <label for="signup-email" class="sr-only">Email address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-envelope text-gray-400"></i>
                                </div>
                                <input id="signup-email" name="email" type="email" required
                                    class="appearance-none rounded-xl relative block w-full px-3 py-3 pl-10 glass-input placeholder-gray-400 sm:text-sm transition-all text-white"
                                    placeholder="Email address">
                            </div>
                        </div>
                        <div>
                            <label for="signup-password" class="sr-only">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input id="signup-password" name="password" type="password" required
                                    class="appearance-none rounded-xl relative block w-full px-3 py-3 pl-10 glass-input placeholder-gray-400 sm:text-sm transition-all text-white"
                                    placeholder="Password">
                            </div>
                        </div>
                    </div>
                    <div>
                        <button type="submit"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 focus:outline-none shadow-[0_0_15px_rgba(236,72,153,0.5)] transition-all">
                            Create Account
                        </button>
                    </div>
                </form>
                <div class="mt-6 text-center text-sm">
                    <span class="opacity-70">Already have an account?</span>
                    <button onclick="toggleAuth('login')"
                        class="font-medium text-indigo-400 hover:text-indigo-300 transition ml-1">Sign in</button>
                </div>
            </div>

            <script>
                function toggleAuth(view) {
                    if (view === 'signup') {
                        document.getElementById('login-form').classList.add('hidden');
                        document.getElementById('signup-form').classList.remove('hidden');
                    } else {
                        document.getElementById('signup-form').classList.add('hidden');
                        document.getElementById('login-form').classList.remove('hidden');
                    }
                }
            </script>
        </div>
    </div>
</div>
{% endblock %}
