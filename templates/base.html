<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="transition-colors duration-300 min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Animated Particles Background -->
    <div id="particles-js"></div>

    <!-- Navbar / Topbar -->
    <header class="glass-card fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="{{ url_for('index') }}" class="text-2xl font-bold gradient-text tracking-wider">
                        <i class="fas fa-brain mr-2"></i>ResuAI
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="{{ url_for('index') }}" class="hover:text-indigo-400 px-3 py-2 rounded-md text-sm font-medium transition">Home</a>
                        <a href="{{ url_for('dashboard') }}" class="hover:text-indigo-400 px-3 py-2 rounded-md text-sm font-medium transition">Dashboard</a>
                    </div>
                </div>

                <!-- Right Side Actions -->
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-white/10 transition focus:outline-none text-indigo-400">
                        <i class="fas fa-moon"></i>
                    </button>
                    {% if session.get('user') %}
                    <span class="text-sm opacity-80 hidden md:inline-block text-indigo-300 font-semibold"><i class="fas fa-user-circle mr-1"></i> {{ session.get('user').split('@')[0] }}</span>
                    <a href="{{ url_for('logout') }}" class="hidden md:inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-pink-600 hover:bg-pink-700 transition shadow-[0_0_15px_rgba(236,72,153,0.5)]">
                        Sign Out
                    </a>
                    {% else %}
                    <a href="{{ url_for('auth') }}" class="hidden md:inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                        Sign In
                    </a>
                    {% endif %}
                    
                    <!-- Mobile menu button -->
                    <div class="-mr-2 flex md:hidden">
                        <button type="button" id="mobile-menu-btn" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-white/10 focus:outline-none">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-20 px-4 sm:px-6 lg:px-8 z-10 w-full max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glass-card mt-auto py-6 text-center z-10 border-t-0">
        <p class="text-sm opacity-70">© 2026 ResuAI Analytics.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
